name: Auto Blog Post Generator

on:
  schedule:
    - cron: '0 6 * * *'    # 6 AM UTC daily post 1
    - cron: '0 14 * * *'   # 2 PM UTC daily post 2
    - cron: '0 20 * * *'   # 8 PM UTC daily post 3
  workflow_dispatch:        # Manual trigger button in GitHub Actions

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');

          const apiKey = process.env.GEMINI_API_KEY;
          if (!apiKey) {
            console.error('❌ GEMINI_API_KEY secret is missing!');
            process.exit(1);
          }

          const TOPICS = [
            { title: "10 Cultural Mistakes Tourists Make in Thailand", cat: "Culture • Travel", emoji: "🇹🇭", keywords: "thailand culture travel mistakes tourists" },
            { title: "How to Know if You're Being Underpaid in 2026", cat: "Career • Finance", emoji: "💰", keywords: "underpaid salary negotiation career" },
            { title: "What Your Attachment Style Says About Your Communication", cat: "Relationships • Psychology", emoji: "💖", keywords: "attachment style relationships communication" },
            { title: "Visa-Free Countries You Probably Didn't Know About", cat: "Travel • Passport", emoji: "✈️", keywords: "visa free travel passport countries" },
            { title: "7 Signs You're in a Toxic Workplace (And What to Do)", cat: "Career • Wellbeing", emoji: "💼", keywords: "toxic workplace signs career mental health" },
            { title: "The Psychology Behind Why Relationships Repeat Patterns", cat: "Psychology • Relationships", emoji: "🧠", keywords: "relationship patterns psychology attachment" },
            { title: "How Rich Are You Really? A Global Perspective on Income", cat: "Finance • Global", emoji: "💵", keywords: "global income wealth comparison finance" },
            { title: "Lucky Numbers Around the World: What Different Cultures Believe", cat: "Culture • Numerology", emoji: "🎰", keywords: "lucky numbers culture numerology worldwide" },
            { title: "Email Mistakes That Make You Sound Passive-Aggressive", cat: "Communication • Career", emoji: "📧", keywords: "email tone passive aggressive professional" },
            { title: "The Most Powerful Passports in the World Right Now", cat: "Travel • Global", emoji: "🌍", keywords: "powerful passports visa free travel 2026" },
            { title: "Should You Quit Your Job? 10 Questions to Ask Yourself", cat: "Career • Decision", emoji: "🤔", keywords: "quit job career decision change work" },
            { title: "What Gaslighting Really Looks Like in Relationships", cat: "Relationships • Psychology", emoji: "🚨", keywords: "gaslighting relationships toxic patterns" },
            { title: "Best Time to Visit Japan: Month by Month Guide", cat: "Travel • Japan", emoji: "🇯🇵", keywords: "best time visit japan travel guide seasons" },
            { title: "How Your Name Sounds in Different Languages", cat: "Culture • Language", emoji: "✍️", keywords: "name meaning cultures languages global" },
            { title: "Understanding the 4 Attachment Styles and How They Affect You", cat: "Psychology • Relationships", emoji: "💖", keywords: "4 attachment styles secure anxious avoidant" },
            { title: "Freelance vs Full-Time: Which Actually Pays More in 2026?", cat: "Career • Finance", emoji: "💼", keywords: "freelance vs full time salary comparison 2026" },
            { title: "Can You Drink the Tap Water? A Guide for 50 Countries", cat: "Travel • Safety", emoji: "🚰", keywords: "tap water safety countries travel guide" },
            { title: "Why Your Emotional Intelligence Matters More Than Your IQ", cat: "Psychology • Self-Growth", emoji: "❤️", keywords: "emotional intelligence EQ IQ psychology" },
            { title: "Cultural Faux Pas to Avoid in the Middle East", cat: "Culture • Travel", emoji: "🕌", keywords: "middle east culture travel mistakes etiquette" },
            { title: "How to Identify Your Core Values and Use Them to Make Better Decisions", cat: "Psychology • Self-Discovery", emoji: "🌟", keywords: "core values identify decision making life" },
            { title: "The Science Behind Why Breakups Hurt So Much", cat: "Relationships • Psychology", emoji: "💔", keywords: "breakup science psychology attachment healing" },
            { title: "10 Signs You Have an Anxious Attachment Style", cat: "Relationships • Psychology", emoji: "🩹", keywords: "anxious attachment style signs relationships" },
            { title: "What Breadcrumbing Looks Like (And Why It Keeps Happening)", cat: "Relationships • Dating", emoji: "🍞", keywords: "breadcrumbing dating relationships signs" },
            { title: "How Different Cultures View Aging and What We Can Learn", cat: "Culture • Lifestyle", emoji: "🌱", keywords: "aging cultures perspective life stages global" },
            { title: "Travel Budget Reality Check: What Things Actually Cost", cat: "Travel • Finance", emoji: "💳", keywords: "travel budget real costs destinations finance" }
          ];

          const MODEL_CANDIDATES = ['gemini-2.5-flash', 'gemini-1.5-flash'];
          const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

          async function generateWithRetry(prompt) {
            for (const modelId of MODEL_CANDIDATES) {
              console.log('🔄 Attempting generation with model: ' + modelId + '...');

              for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                  const response = await fetch('https://generativelanguage.googleapis.com/v1/models/' + modelId + ':generateContent?key=' + apiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: { temperature: 0.7, maxOutputTokens: 2000 }
                    })
                  });

                  const data = await response.json();
                  const content = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.cards?.[0] ? null : data.candidates?.[0]?.content?.parts?.[0]?.text;

                  if (response.ok && content) {
                    console.log('✅ Success! Generated post using model: ' + modelId);
                    return content;
                  }

                  const errorMsg = (data.error && data.error.message) || '';
                  const isRateLimit = response.status === 429 || errorMsg.includes('quota') || errorMsg.includes('exceeded');

                  if (isRateLimit && attempt < 3) {
                    console.warn('⏳ Rate limit hit on ' + modelId + ' (Attempt ' + attempt + '/3). Waiting 20 seconds...');
                    await sleep(20000);
                    continue;
                  }

                  console.warn('⚠️ Model ' + modelId + ' notice:', errorMsg || 'No content returned');
                  break; 
                } catch (err) {
                  console.warn('⚠️ Request error for ' + modelId + ':', err.message);
                  break;
                }
              }
            }
            throw new Error('All Gemini model candidates failed after retries.');
          }

          async function run() {
            const topicIndex = Math.floor(Date.now() / (8 * 3600 * 1000)) % TOPICS.length;
            const topic = TOPICS[topicIndex];

            const prompt = 'Write a high-quality, SEO-optimized blog post for a website called LifePera (lifepera.com) – a free tools website.\n\nTitle: "' + topic.title + '"\nCategory: ' + topic.cat + '\nTarget keywords: ' + topic.keywords + '\n\nRequirements:\n- 900-1200 words of genuinely useful, original content\n- Written in a smart, conversational tone – not corporate, not academic\n- Include practical takeaways people can act on\n- Use subheadings (H2) to break up sections\n- Include a brief intro that hooks the reader immediately\n- End with a call to action mentioning a relevant free tool on LifePera\n- No fluff, no padding, no "In conclusion" sections\n- Write for a global audience (not US-only perspective)\n\nFormat the response as valid HTML with these exact tags only:\n- <h2> for section headings\n- <p> for paragraphs  \n- <ul> and <li> for lists\n- <strong> for emphasis\n\nDo NOT include: html, head, body, header tags, or any CSS. Just the content HTML fragments.';

            const content = await generateWithRetry(prompt);

            const now = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const slug = topic.title.toLowerCase()
              .replace(/[^a-z0-9\s]/g, '')
              .replace(/\s+/g, '-')
              .substring(0, 60);

            if (!fs.existsSync('blog')) fs.mkdirSync('blog');
            const filename = 'blog/post-' + dateStr + '-' + slug + '.html';
            const niceDate = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            const html = '<!DOCTYPE html>\n' +
            '<html lang="en">\n' +
            '<head>\n' +
            '<meta charset="UTF-8"/>\n' +
            '<meta name="viewport" content="width=device-width,initial-scale=1.0"/>\n' +
            '<meta name="description" content="' + topic.title + ' – Free insights and tools on LifePera. ' + topic.keywords + '."/>\n' +
            '<meta name="keywords" content="' + topic.keywords + '"/>\n' +
            '<meta property="og:title" content="' + topic.title + ' – LifePera"/>\n' +
            '<meta property="og:description" content="Read the full guide on LifePera – free tools for real life decisions."/>\n' +
            '<meta property="og:url" content="https://lifepera.com/' + filename + '"/>\n' +
            '<title>' + topic.title + ' – LifePera</title>\n' +
            '<link rel="preconnect" href="https://fonts.googleapis.com"/>\n' +
            '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>\n' +
            '<style>\n' +
            '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n' +
            ':root{--bg:#07080b;--surface:#0d0f14;--card:#121520;--border:#1c2030;--border2:#242b3d;--gold:#c8a84b;--gold2:#e8cc80;--teal:#00c2a8;--rose:#e8547a;--text:#eef0f8;--text2:#b0b8cc;--muted:#626880;--col:1180px;--article:720px}\n' +
            'html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:\'Lora\',serif;line-height:1.7;-webkit-font-smoothing:antialiased}\n' +
            '::selection{background:var(--gold);color:#000}a{text-decoration:none;color:inherit}\n' +
            'nav{position:sticky;top:0;z-index:500;background:rgba(7,8,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}\n' +
            '.nav-inner{max-width:var(--col);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px}\n' +
            '.logo{font-family:\'Syne\',sans-serif;font-size:1.45rem;font-weight:900;letter-spacing:-.03em}.logo-dot{color:var(--gold)}\n' +
            '.nav-btn{font-family:\'Syne\',sans-serif;font-size:.82rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;padding:8px 20px;border-radius:6px;border:none;cursor:pointer}\n' +
            '.wrap{max-width:var(--article);margin:0 auto;padding:3rem 2rem}\n' +
            '.breadcrumb{font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:var(--muted);margin-bottom:2rem}\n' +
            '.post-cat{font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.8rem}\n' +
            'h1{font-family:\'Syne\',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:1rem}\n' +
            '.meta{font-family:\'JetBrains Mono\',monospace;font-size:.7rem;color:var(--muted);padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem}\n' +
            '.hero-img{aspect-ratio:16/7;background:linear-gradient(135deg,#1a1208,#2d1f0a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:4rem;margin-bottom:2.5rem}\n' +
            '.ad-slot{background:var(--surface);border:1px dashed var(--border2);height:90px;display:flex;align-items:center;justify-content:center;font-family:\'JetBrains Mono\',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;border-radius:8px;margin:1.5rem 0}\n' +
            '.body p{font-size:1rem;color:var(--text2);line-height:1.8;margin-bottom:1.3rem}\n' +
            '.body p:first-child{font-size:1.08rem;color:var(--text)}\n' +
            '.body h2{font-family:\'Syne\',sans-serif;font-size:1.35rem;font-weight:900;letter-spacing:-.02em;margin:2.5rem 0 1rem;color:var(--text)}\n' +
            '.body strong{color:var(--text);font-weight:600}\n' +
            '.body ul,.body ol{margin:1rem 0 1.5rem 1.5rem;color:var(--text2)}\n' +
            '.body li{margin-bottom:.5rem;line-height:1.65}\n' +
            '.tool-cta{background:linear-gradient(135deg,var(--card),#161a24);border:1px solid rgba(200,168,75,.25);border-radius:12px;padding:1.8rem;margin:2rem 0;display:flex;gap:1.2rem;align-items:center}\n' +
            '.tc-icon{font-size:2rem;flex-shrink:0}\n' +
            '.tc-title{font-family:\'Syne\',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.3rem}\n' +
            '.tc-desc{font-size:.85rem;color:var(--muted);margin-bottom:.8rem}\n' +
            '.tc-btn{display:inline-block;font-family:\'Syne\',sans-serif;font-size:.8rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;padding:8px 18px;border-radius:6px}\n' +
            '.share-row{border-top:1px solid var(--border);margin-top:2.5rem;padding-top:1.5rem}\n' +
            '.sr-label{font-family:\'JetBrains Mono\',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.8rem}\n' +
            '.share-btns{display:flex;gap:.6rem;flex-wrap:wrap}\n' +
            '.share-btn{font-family:\'JetBrains Mono\',monospace;font-size:.72rem;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;background:none;color:var(--text2);transition:all .2s}\n' +
            '.share-btn.tw{border-color:#1DA1F2;color:#1DA1F2}.share-btn.fb{border-color:#4267B2;color:#4267B2}.share-btn.wa{border-color:#25D366;color:#25D366}\n' +
            'footer{background:var(--surface);border-top:1px solid var(--border);margin-top:3rem}\n' +
            '.footer-bottom{max-width:var(--col);margin:0 auto;padding:1.5rem 2rem;display:flex;justify-content:space-between;font-family:\'JetBrains Mono\',monospace;font-size:.65rem;color:var(--muted);flex-wrap:wrap;gap:1rem}\n' +
            '.footer-bottom a{color:var(--muted)}.footer-bottom a:hover{color:var(--gold)}\n' +
            '@media(max-width:768px){.wrap{padding:2rem 1.5rem}.tool-cta{flex-direction:column}}\n' +
            '</style>\n' +
            '</head>\n' +
            '<body>\n' +
            '<nav><div class="nav-inner">\n' +
            '  <a class="logo" href="/index.html">Life<span class="logo-dot">Pera</span></a>\n' +
            '  <a class="nav-btn" href="/tools.html">All Tools</a>\n' +
            '</div></nav>\n' +
            '<div class="wrap">\n' +
            '  <div class="breadcrumb"><a href="/index.html">Home</a> • <a href="/blog.html">Blog</a> • ' + topic.cat + '</div>\n' +
            '  <div class="post-cat">' + topic.cat + '</div>\n' +
            '  <h1>' + topic.title + '</h1>\n' +
            '  <div class="meta">Zulker Nine • ' + niceDate + ' • LifePera Blog</div>\n' +
            '  <div class="hero-img">' + topic.emoji + '</div>\n' +
            '  <div class="ad-slot">Advertisement • 728×90</div>\n' +
            '  <div class="body">\n' +
            content + '\n' +
            '  </div>\n' +
            '  <div class="tool-cta">\n' +
            '    <div class="tc-icon">🛠️</div>\n' +
            '    <div>\n' +
            '      <div class="tc-title">Try Our Free Tools on LifePera</div>\n' +
            '      <div class="tc-desc">36 free tools covering travel, relationships, career, culture, psychology and finance. No signup required.</div>\n' +
            '      <a class="tc-btn" href="/tools.html">Explore All Free Tools →</a>\n' +
            '    </div>\n' +
            '  </div>\n' +
            '  <div class="share-row">\n' +
            '    <div class="sr-label">Share this post</div>\n' +
            '    <div class="share-btns">\n' +
            '      <button class="share-btn tw" onclick="window.open(\'https://twitter.com/intent/tweet?text=\' + encodeURIComponent(\'' + topic.title + '\\nhttps://lifepera.com/' + filename + '\'),\'_blank\')">Tweet</button>\n' +
            '      <button class="share-btn fb" onclick="window.open(\'https://www.facebook.com/sharer/sharer.php?u=\' + encodeURIComponent(\'https://lifepera.com/' + filename + '\'),\'_blank\')">Facebook</button>\n' +
            '      <button class="share-btn wa" onclick="window.open(\'https://wa.me/?text=\' + encodeURIComponent(\'' + topic.title + '\\nhttps://lifepera.com/' + filename + '\'),\'_blank\')">WhatsApp</button>\n' +
            '      <button class="share-btn" onclick="navigator.clipboard.writeText(\'https://lifepera.com/' + filename + '\').then(()=>alert(\'Copied!\'))">📋 Copy</button>\n' +
            '    </div>\n' +
            '  </div>\n' +
            '</div>\n' +
            '<footer><div class="footer-bottom">\n' +
            '  <span>© 2026 LifePera • lifepera.com</span>\n' +
            '  <span><a href="/privacy.html">Privacy</a> • <a href="/terms.html">Terms</a> • <a href="/blog.html">Blog</a></span>\n' +
            '</div></footer>\n' +
            '</body></html>';

            fs.writeFileSync(filename, html);
            console.log('✅ Generated: ' + filename);

            const blogIndexFile = 'blog-index.json';
            let blogPosts = [];
            if (fs.existsSync(blogIndexFile)) {
              try {
                blogPosts = JSON.parse(fs.readFileSync(blogIndexFile, 'utf8'));
              } catch (e) {}
            }
            blogPosts.unshift({
              title: topic.title,
              cat: topic.cat,
              emoji: topic.emoji,
              date: niceDate,
              file: filename
            });
            blogPosts = blogPosts.slice(0, 100);
            fs.writeFileSync(blogIndexFile, JSON.stringify(blogPosts, null, 2));
            console.log('✅ Updated blog-index.json');
          }

          run().catch(err => {
            console.error('❌ Processing Error:', err.message);
            process.exit(1);
          });
          SCRIPT

      - name: Commit and push new blog post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "LifePera Auto Blog"
          git add .
          git diff --staged --quiet || git commit -m "Auto blog post: $(date +'%Y-%m-%d %H:%M')"
          git push
