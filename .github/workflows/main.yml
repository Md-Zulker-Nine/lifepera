name: Auto Blog Post Generator

on:
  schedule:
    - cron: '0 6 * * *'    # 6 AM UTC
    - cron: '0 14 * * *'   # 2 PM UTC
    - cron: '0 20 * * *'   # 8 PM UTC
  workflow_dispatch:        # Manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog post with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate.js

      - name: Commit and push new blog post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "LifePera Auto Blog"
          git add .
          git diff --staged --quiet || git commit -m "Auto blog post: $(date +'%Y-%m-%d %H:%M')"
          git push
